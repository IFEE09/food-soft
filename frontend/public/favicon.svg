<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0D0D0D"/>
  <!-- Hexagon -->
  <polygon points="16,3 27,9 27,23 16,29 5,23 5,9" fill="none" stroke="#C8FF00" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- 5 lines converging to right point -->
  <line x1="7" y1="11" x2="22" y2="16" stroke="#C8FF00" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7" y1="13.5" x2="22" y2="16" stroke="#C8FF00" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7" y1="16" x2="22" y2="16" stroke="#C8FF00" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7" y1="18.5" x2="22" y2="16" stroke="#C8FF00" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7" y1="21" x2="22" y2="16" stroke="#C8FF00" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Convergence dot -->
  <circle cx="22" cy="16" r="1.5" fill="#C8FF00"/>
  <!-- Left dots -->
  <circle cx="7" cy="11" r="1.2" fill="none" stroke="#C8FF00" stroke-width="1"/>
  <circle cx="7" cy="13.5" r="1.2" fill="none" stroke="#C8FF00" stroke-width="1"/>
  <circle cx="7" cy="16" r="1.2" fill="none" stroke="#C8FF00" stroke-width="1"/>
  <circle cx="7" cy="18.5" r="1.2" fill="none" stroke="#C8FF00" stroke-width="1"/>
  <circle cx="7" cy="21" r="1.2" fill="none" stroke="#C8FF00" stroke-width="1"/>
</svg>
