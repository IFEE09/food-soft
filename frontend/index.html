<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Preconnect + Preload fuente Inter (evita bloqueo de render) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap"
      />
    </noscript>

    <!-- Meta theme-color para mobile browsers -->
    <meta name="theme-color" content="#006AFF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0D0D0D" media="(prefers-color-scheme: dark)" />

    <!-- Título y Descripción SEO -->
    <title>omnikook | Unify the kitchen. Rule the chat.</title>
    <meta name="description" content="Centraliza la comunicación omnicanal para que el equipo se enfoque en cocinar. El sistema operativo estándar de la Nueva Era de la Restauración Digital." />

    <!-- Meta Tags para Redes Sociales (Open Graph) -->
    <meta property="og:title" content="omnikook | Unify the kitchen. Rule the chat." />
    <meta property="og:description" content="Centraliza la comunicación omnicanal para que el equipo se enfoque en cocinar." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="omnikook" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="omnikook | Unify the kitchen. Rule the chat." />
    <meta name="twitter:description" content="Centraliza la comunicación omnicanal para que el equipo se enfoque en cocinar." />

    <!-- ==========================================

    </script>
    -->
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
